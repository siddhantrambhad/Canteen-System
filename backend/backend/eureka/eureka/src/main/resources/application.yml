server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    # This service IS the registry — it should not register itself
    register-with-eureka: false
    # It has no other Eureka to fetch from
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    # Stops Eureka from printing warnings about no instances
    # during the first 2 minutes of startup
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 0